# Delay installations of recently published packages, allowing time for the community to discover
# and report potential security issues or functional problems.
minimumReleaseAge: 4320 # 3 days

# Fail if a package's trust level has decreased
trustPolicy: no-downgrade

# False positive: semver@6.3.1 (2023-07-10, ReDoS fix backported to the v6 line)
# was published after semver 7.5.1-7.5.4, which have provenance attestations.
# The trust check compares by publish date only, so the v6 backport looks like
# a downgrade from the v7 line.
trustPolicyExclude:
  - 'semver@6.3.1'

# Dependencies allowed to run postinstall/build scripts
onlyBuiltDependencies:
  - esbuild
  - '@pulumi/command'
  - protobufjs

overrides:
  '@smithy/types': 4.13.1

packages:
  - 'bin'
  - 'infra'
  - 'packages/*'
  - 'tests/*'
