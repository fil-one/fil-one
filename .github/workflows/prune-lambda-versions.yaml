name: 'Prune old Lambda versions'

on:
  schedule:
    - cron: '0 9 * * *'

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        stage: [production, staging]
    concurrency:
      group: prune-lambda-versions-${{ matrix.stage }}
      cancel-in-progress: false
    environment: ${{ matrix.stage }}
    permissions:
      id-token: write
      contents: read
    env:
      REGION: us-east-2

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - name: Prune old Lambda versions
        run: bin/prune-lambda-versions.sh "${{ matrix.stage }}"

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "filone-alerts",
              "text": "Lambda version pruning failed for ${{ matrix.stage }}. Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Lambda version pruning failed* (`${{ matrix.stage }}`) · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Details>"
                  }
                }
              ]
            }
